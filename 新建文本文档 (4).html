<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pascal个人专用网站</title>
    <style>
        /* 基本样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            color: black;
            line-height: 1.6;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 顶部横幅 */
        .banner {
            background-color: #f0f0f0;
            padding: 20px;
            border: 2px solid #333;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .update-info {
            font-size: 1.2rem;
            color: #666;
            font-style: italic;
        }
        
        .launch-date {
            font-size: 1.1rem;
            color: #d9534f;
            font-weight: bold;
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #fff;
            border: 1px solid #d9534f;
            border-radius: 5px;
            display: inline-block;
        }
        
        /* 告示板区域 */
        .notice-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }
        
        .notice-board {
            border: 3px solid #333;
            border-radius: 10px;
            padding: 20px;
            background-color: #fff8dc;
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        .notice-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 15px;
            color: #d9534f;
            text-decoration: underline;
        }
        
        .notice-content {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #333;
            font-weight: bold;
            padding: 20px;
            background-color: #ffffcc;
            border: 2px dashed #ff9900;
            border-radius: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        /* 贪吃蛇游戏区域 */
        .game-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }
        
        .game-container {
            border: 3px solid #333;
            border-radius: 10px;
            padding: 20px;
            background-color: #f9f9f9;
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
        }
        
        .game-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #d9534f;
        }
        
        .game-instruction {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #555;
        }
        
        /* 贪吃蛇游戏样式 */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #game-canvas {
            border: 3px solid #333;
            background-color: #000;
            border-radius: 5px;
        }
        
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .control-btn {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        
        .control-btn:hover {
            background-color: #45a049;
        }
        
        .control-btn:active {
            transform: translateY(2px);
        }
        
        .game-info {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
        }
        
        .game-stat {
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        /* 方向控制按钮（移动端） */
        .mobile-controls {
            display: none;
            margin-top: 20px;
        }
        
        .direction-buttons {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }
        
        .dir-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .dir-btn.up { grid-column: 2; grid-row: 1; }
        .dir-btn.left { grid-column: 1; grid-row: 2; }
        .dir-btn.right { grid-column: 3; grid-row: 2; }
        .dir-btn.down { grid-column: 2; grid-row: 3; }
        
        /* 联系信息 */
        .contact-section {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            background-color: #f0f0f0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }
        
        .developer-info {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }
        
        .phone-number {
            font-size: 1.5rem;
            color: #d9534f;
            margin: 10px 0;
            font-weight: bold;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            border-top: 1px solid #ddd;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .title {
                font-size: 1.8rem;
            }
            
            .notice-content {
                font-size: 1.4rem;
                padding: 15px;
            }
            
            #game-canvas {
                width: 300px;
                height: 300px;
            }
            
            .mobile-controls {
                display: block;
            }
        }
        
        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }
            
            .notice-content {
                font-size: 1.2rem;
                padding: 10px;
            }
            
            #game-canvas {
                width: 280px;
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部横幅 -->
    <div class="banner">
        <h1 class="title">Pascal个人专用网站</h1>
        <p class="update-info">大约一周更新一次！！！</p>
        <div class="launch-date">🎉 2026年4月4日正式建站 🎉</div>
    </div>
    
    <!-- 告示板区域 -->
    <div class="notice-section">
        <div class="notice-board">
            <h2 class="notice-title">本周告示</h2>
            <div class="notice-content">
                Pascal666.top正式建站！！！！！
            </div>
        </div>
    </div>
    
    <!-- 贪吃蛇游戏区域 -->
    <div class="game-section">
        <div class="game-container">
            <h2 class="game-title">贪吃蛇小游戏</h2>
            <p class="game-instruction">使用方向键或WASD控制蛇的移动 | 吃到食物增长身体 | 避免撞墙或撞到自己</p>
            
            <div class="game-wrapper">
                <!-- 游戏信息 -->
                <div class="game-info">
                    <div class="game-stat">分数: <span id="score">0</span></div>
                    <div class="game-stat">游戏状态: <span id="game-status">准备开始</span></div>
                    <div class="game-stat">最高分: <span id="high-score">0</span></div>
                </div>
                
                <!-- 游戏画布 -->
                <canvas id="game-canvas" width="400" height="400"></canvas>
                
                <!-- 游戏控制 -->
                <div class="game-controls">
                    <button id="start-btn" class="control-btn">开始游戏</button>
                    <button id="pause-btn" class="control-btn">暂停游戏</button>
                    <button id="restart-btn" class="control-btn">重新开始</button>
                </div>
                
                <!-- 移动端方向控制 -->
                <div class="mobile-controls">
                    <div class="direction-buttons">
                        <button class="dir-btn up" data-dir="up">↑</button>
                        <button class="dir-btn left" data-dir="left">←</button>
                        <button class="dir-btn right" data-dir="right">→</button>
                        <button class="dir-btn down" data-dir="down">↓</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 联系信息 -->
    <div class="contact-section">
        <p class="developer-info">开发者电话:</p>
        <p class="phone-number">86+ 15982355536</p>
        <p style="color: #777; margin-top: 10px;">如有网站问题或合作意向，欢迎联系！</p>
    </div>
    
    <!-- 页脚 -->
    <div class="footer">
        <p>© 2025 Pascal个人专用网站 | 最后更新: 2026年4月4日 | 建站日: 2026年4月4日</p>
    </div>

    <script>
        // 贪吃蛇游戏逻辑
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const scoreElement = document.getElementById('score');
            const gameStatusElement = document.getElementById('game-status');
            const highScoreElement = document.getElementById('high-score');
            const startBtn = document.getElementById('start-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const restartBtn = document.getElementById('restart-btn');
            
            // 游戏参数
            const gridSize = 20;
            const tileCount = canvas.width / gridSize;
            
            // 游戏状态
            let snake = [];
            let food = {};
            let direction = { x: 0, y: 0 };
            let nextDirection = { x: 0, y: 0 };
            let score = 0;
            let highScore = localStorage.getItem('snakeHighScore') || 0;
            let gameRunning = false;
            let gamePaused = false;
            let gameLoop;
            
            // 初始化游戏
            function initGame() {
                // 初始化蛇
                snake = [
                    { x: 10, y: 10 }
                ];
                
                // 初始化食物
                generateFood();
                
                // 初始化方向
                direction = { x: 0, y: 0 };
                nextDirection = { x: 0, y: 0 };
                
                // 初始化分数
                score = 0;
                
                // 更新显示
                scoreElement.textContent = score;
                highScoreElement.textContent = highScore;
                gameStatusElement.textContent = '准备开始';
                
                // 绘制初始状态
                draw();
            }
            
            // 生成食物
            function generateFood() {
                // 确保食物不会生成在蛇身上
                let foodOnSnake;
                do {
                    foodOnSnake = false;
                    food = {
                        x: Math.floor(Math.random() * tileCount),
                        y: Math.floor(Math.random() * tileCount)
                    };
                    
                    // 检查食物是否在蛇身上
                    for (let segment of snake) {
                        if (segment.x === food.x && segment.y === food.y) {
                            foodOnSnake = true;
                            break;
                        }
                    }
                } while (foodOnSnake);
            }
            
            // 绘制游戏
            function draw() {
                // 清空画布
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 绘制网格
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 0.5;
                for (let i = 0; i < tileCount; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * gridSize, 0);
                    ctx.lineTo(i * gridSize, canvas.height);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(0, i * gridSize);
                    ctx.lineTo(canvas.width, i * gridSize);
                    ctx.stroke();
                }
                
                // 绘制蛇
                snake.forEach((segment, index) => {
                    if (index === 0) {
                        // 蛇头
                        ctx.fillStyle = '#4CAF50';
                    } else {
                        // 蛇身
                        ctx.fillStyle = '#8BC34A';
                    }
                    
                    ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 1, gridSize - 1);
                    
                    // 蛇头眼睛
                    if (index === 0) {
                        ctx.fillStyle = 'white';
                        const eyeSize = 3;
                        
                        // 根据方向绘制眼睛位置
                        let eye1X, eye1Y, eye2X, eye2Y;
                        
                        if (direction.x === 1) { // 向右
                            eye1X = segment.x * gridSize + gridSize - 5;
                            eye1Y = segment.y * gridSize + 5;
                            eye2X = segment.x * gridSize + gridSize - 5;
                            eye2Y = segment.y * gridSize + gridSize - 5;
                        } else if (direction.x === -1) { // 向左
                            eye1X = segment.x * gridSize + 5;
                            eye1Y = segment.y * gridSize + 5;
                            eye2X = segment.x * gridSize + 5;
                            eye2Y = segment.y * gridSize + gridSize - 5;
                        } else if (direction.y === 1) { // 向下
                            eye1X = segment.x * gridSize + 5;
                            eye1Y = segment.y * gridSize + gridSize - 5;
                            eye2X = segment.x * gridSize + gridSize - 5;
                            eye2Y = segment.y * gridSize + gridSize - 5;
                        } else { // 向上或静止
                            eye1X = segment.x * gridSize + 5;
                            eye1Y = segment.y * gridSize + 5;
                            eye2X = segment.x * gridSize + gridSize - 5;
                            eye2Y = segment.y * gridSize + 5;
                        }
                        
                        ctx.beginPath();
                        ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                
                // 绘制食物
                ctx.fillStyle = '#FF5252';
                ctx.beginPath();
                const centerX = food.x * gridSize + gridSize / 2;
                const centerY = food.y * gridSize + gridSize / 2;
                const radius = gridSize / 2 - 2;
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fill();
                
                // 食物光泽效果
                ctx.fillStyle = '#FFCDD2';
                ctx.beginPath();
                ctx.arc(centerX - 3, centerY - 3, 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 更新游戏状态
            function update() {
                if (!gameRunning || gamePaused) return;
                
                // 更新方向
                direction = { ...nextDirection };
                
                // 如果蛇没有移动，不更新
                if (direction.x === 0 && direction.y === 0) return;
                
                // 计算新的蛇头位置
                const head = { ...snake[0] };
                head.x += direction.x;
                head.y += direction.y;
                
                // 检查是否撞墙
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                    gameOver();
                    return;
                }
                
                // 检查是否撞到自己
                for (let segment of snake) {
                    if (head.x === segment.x && head.y === segment.y) {
                        gameOver();
                        return;
                    }
                }
                
                // 将新头部添加到蛇
                snake.unshift(head);
                
                // 检查是否吃到食物
                if (head.x === food.x && head.y === food.y) {
                    // 增加分数
                    score += 10;
                    scoreElement.textContent = score;
                    
                    // 更新最高分
                    if (score > highScore) {
                        highScore = score;
                        highScoreElement.textContent = highScore;
                        localStorage.setItem('snakeHighScore', highScore);
                    }
                    
                    // 生成新食物
                    generateFood();
                } else {
                    // 如果没有吃到食物，移除蛇尾
                    snake.pop();
                }
                
                // 重绘
                draw();
            }
            
            // 游戏结束
            function gameOver() {
                gameRunning = false;
                clearInterval(gameLoop);
                gameStatusElement.textContent = '游戏结束！';
                startBtn.textContent = '重新开始';
            }
            
            // 开始游戏
            function startGame() {
                if (!gameRunning) {
                    // 如果游戏未开始，初始化游戏
                    if (gameStatusElement.textContent === '游戏结束！') {
                        initGame();
                    }
                    
                    gameRunning = true;
                    gamePaused = false;
                    gameStatusElement.textContent = '游戏中...';
                    startBtn.textContent = '重新开始';
                    
                    // 如果蛇没有方向，设置初始方向
                    if (direction.x === 0 && direction.y === 0) {
                        direction = { x: 1, y: 0 };
                        nextDirection = { x: 1, y: 0 };
                    }
                    
                    // 开始游戏循环
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, 150);
                } else {
                    // 如果游戏已在运行，重新开始
                    initGame();
                    startGame();
                }
            }
            
            // 暂停/继续游戏
            function togglePause() {
                if (!gameRunning) return;
                
                gamePaused = !gamePaused;
                if (gamePaused) {
                    gameStatusElement.textContent = '已暂停';
                    pauseBtn.textContent = '继续游戏';
                } else {
                    gameStatusElement.textContent = '游戏中...';
                    pauseBtn.textContent = '暂停游戏';
                }
            }
            
            // 键盘控制
            document.addEventListener('keydown', function(e) {
                if (!gameRunning || gamePaused) return;
                
                switch(e.key) {
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        if (direction.y === 0) {
                            nextDirection = { x: 0, y: -1 };
                        }
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        if (direction.y === 0) {
                            nextDirection = { x: 0, y: 1 };
                        }
                        break;
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        if (direction.x === 0) {
                            nextDirection = { x: -1, y: 0 };
                        }
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        if (direction.x === 0) {
                            nextDirection = { x: 1, y: 0 };
                        }
                        break;
                }
            });
            
            // 移动端方向按钮控制
            document.querySelectorAll('.dir-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (!gameRunning || gamePaused) return;
                    
                    const dir = this.getAttribute('data-dir');
                    switch(dir) {
                        case 'up':
                            if (direction.y === 0) {
                                nextDirection = { x: 0, y: -1 };
                            }
                            break;
                        case 'down':
                            if (direction.y === 0) {
                                nextDirection = { x: 0, y: 1 };
                            }
                            break;
                        case 'left':
                            if (direction.x === 0) {
                                nextDirection = { x: -1, y: 0 };
                            }
                            break;
                        case 'right':
                            if (direction.x === 0) {
                                nextDirection = { x: 1, y: 0 };
                            }
                            break;
                    }
                });
            });
            
            // 按钮事件监听
            startBtn.addEventListener('click', startGame);
            pauseBtn.addEventListener('click', togglePause);
            restartBtn.addEventListener('click', function() {
                initGame();
                gameRunning = false;
                gamePaused = false;
                gameStatusElement.textContent = '准备开始';
                startBtn.textContent = '开始游戏';
                pauseBtn.textContent = '暂停游戏';
                clearInterval(gameLoop);
                draw();
            });
            
            // 初始化游戏
            initGame();
        });
    </script>
</body>
</html>
